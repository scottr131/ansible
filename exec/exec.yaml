---
 
- name: Execute remote command
  gather_facts: false
  hosts: "{{ target_hosts }}"
  become: "{{ exec_as_root | default(false) }}"
 
  vars:
    run_command: "uptime"
 
  tasks:
    - name: Validate that a command was provided
      ansible.builtin.assert:
        that:
          - run_command is defined
          - run_command | length > 0
        fail_msg: "You must set run_command to a non-empty value."
      # Safety net so you don't accidentally run the default on every host
      # when you meant to pass something specific. Remove this task if
      # you actually want "uptime" as a useful default.
 
    - name: "Run: {{ run_command }}"
      ansible.builtin.shell: "{{ run_command }}"
      register: command_output
      changed_when: false
      # changed_when: false because a read-only command like uptime
      # doesn't change state. If you're running mutating commands,
      # set changed_when: true or use a smarter condition.
 
    - name: Show output
      ansible.builtin.debug:
        var: command_output.stdout_lines
 

